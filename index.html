<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Figma Design</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, rgba(130, 24, 26, 0.3) 0%, #000000 50%, #000000 100%);
            min-height: 100vh;
            color: #ffffff;
            overflow-x: hidden;
        }

        .container {
            max-width: 1324px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            min-height: 1747px;
        }

        /* 背景装饰圆形 */
        .circle-red {
            position: absolute;
            width: 384px;
            height: 384px;
            background: rgba(231, 0, 11, 0.3);
            border-radius: 50%;
            filter: blur(200px);
            top: 436px;
            left: 331px;
            z-index: 1;
        }

        .circle-purple {
            position: absolute;
            width: 384px;
            height: 384px;
            background: rgba(152, 16, 250, 0.2);
            border-radius: 50%;
            filter: blur(200px);
            top: 926px;
            left: 609px;
            z-index: 1;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
                min-height: auto;
            }

            .circle-red {
                width: 200px;
                height: 200px;
                top: 200px;
                left: 10%;
                filter: blur(100px);
            }

            .circle-purple {
                width: 200px;
                height: 200px;
                top: 500px;
                left: 40%;
                filter: blur(100px);
            }
        }

        @media (max-width: 480px) {
            .circle-red {
                width: 150px;
                height: 150px;
                top: 150px;
                filter: blur(80px);
            }

            .circle-purple {
                width: 150px;
                height: 150px;
                top: 400px;
                filter: blur(80px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="circle-red"></div>
        <div class="circle-purple"></div>
        
        <!-- 内容区域 -->
        <main style="position: relative; z-index: 10; padding-top: 100px;">
            <h1 style="font-size: 3rem; text-align: center; margin-bottom: 20px;">Figma Design</h1>
            <p style="font-size: 1.2rem; text-align: center; opacity: 0.8;">基于 Figma 设计稿还原的网站</p>
        </main>
    </div>
</body>
</html>
